name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-notarize:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri:build:universal
      - name: Verify universal artifacts
        run: |
          APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/Recall Memory.app"
          lipo -info "$APP/Contents/MacOS/recall-evolution"
          lipo -info "$APP/Contents/MacOS/evolution-mcp"
          codesign --verify --deep --strict --verbose=2 "$APP"
      - name: Notarize and staple
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)
          xcrun notarytool submit "$DMG" --wait --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
